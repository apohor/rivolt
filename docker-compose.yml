# Production-like single container. Builds web + go, serves on :8080.
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080
services:
  rivolt:
    build:
      context: .
      dockerfile: Dockerfile
    image: rivolt:local
    container_name: rivolt
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: "/data"
      # Optional AI hooks (future analysis features). Set exactly one
      # key; if multiple are set, openai wins unless AI_PROVIDER selects
      # otherwise.
      AI_PROVIDER: "${AI_PROVIDER:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-${GOOGLE_API_KEY:-}}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
    volumes:
      - rivolt-data:/data
    restart: unless-stopped

volumes:
  rivolt-data:
