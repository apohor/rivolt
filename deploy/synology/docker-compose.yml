# Rivolt on Synology Container Manager (DSM 7.2+).
#
# Deploy: Container Manager → Project → Create
#   Path:   /volume1/docker/rivolt
#   Source: Create docker-compose.yml (paste this)
#   Build → Run → http://<nas-ip>:8081
#
# Data volume lives at /volume1/@docker/volumes/rivolt_rivolt-data/_data.
# Update by clicking Build again (pulls :latest).

# YAML anchor so the postgres password is declared once and reused
# by both services. Change this single literal before first boot.
x-pg-password: &pg_password "change-me"

services:
  rivolt:
    image: ghcr.io/apohor/rivolt:latest
    container_name: rivolt
    restart: always
    # Host port is 8081; Caffeine owns 8080 on this NAS.
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADDR: ":8080"
      DATA_DIR: "/data"
      TZ: "America/Chicago"

      # Auth. OIDC-only. Configure RIVOLT_OIDC_PROVIDERS plus the
      # per-provider issuer/client/secret to enable sign-in.
      # Cookie-signing key auto-generated on first boot to
      # ${DATA_DIR}/cookie_secret. Set RIVOLT_COOKIE_SECRET (hex)
      # explicitly only for multi-replica key sharing.
      RIVOLT_SECURE_COOKIE: "true"  # DSM is fronted by HTTPS

      # Envelope key (KEK). Required. 32-byte AES-256 key, base64-
      # encoded, prefixed with a key-id and a colon. The key-id is
      # arbitrary ("v1" is fine for first boot) and gets stored
      # alongside each ciphertext so future rotations can decrypt
      # legacy rows. Generate with:
      #
      #   echo "v1:$(openssl rand -base64 32)"
      #
      # Treat this like a database password — losing it bricks every
      # encrypted secret in the DB (Rivian session, AI keys, VAPID
      # private keys). Back it up out-of-band before first boot.
      #
      # Rotation: set RIVOLT_KEK to the new key (e.g. "v2:...") and
      # add the previous key as RIVOLT_KEK_ROTATION="v1:..." so the
      # old ciphertexts keep decrypting until a background rewrap
      # migrates them.
      RIVOLT_KEK: "v1:REPLACE_WITH_OUTPUT_OF_openssl_rand_base64_32"
      # RIVOLT_KEK_ROTATION: "v0:..."  # optional, comma-separated old keys

      # Optional: OIDC sign-in (Phase 2 — Identity).
      # When enabled, Rivolt mounts /api/auth/oidc/{name}/{start,callback}
      # and the SPA renders a "Continue with X" button per provider on
      # /login. Username/password login keeps working alongside it.
      #
      # RIVOLT_BASE_URL is required as soon as any provider is set —
      # the OIDC redirect URL is derived from it
      # ({BASE_URL}/api/auth/oidc/{name}/callback) and that path must
      # match what's registered in the IdP byte-for-byte.
      #
      # RIVOLT_BASE_URL: "https://rivolt.example.com"
      # RIVOLT_OIDC_PROVIDERS: "google"   # comma-separated slugs
      #
      # Google example. Create an OAuth Web Application credential at
      # https://console.cloud.google.com → APIs & Services → Credentials.
      # Authorized redirect URI must be exactly:
      #   {RIVOLT_BASE_URL}/api/auth/oidc/google/callback
      # RIVOLT_OIDC_GOOGLE_ISSUER: "https://accounts.google.com"
      # RIVOLT_OIDC_GOOGLE_CLIENT_ID: ""        # 1234-abc.apps.googleusercontent.com
      # RIVOLT_OIDC_GOOGLE_CLIENT_SECRET: ""    # GOCSPX-...
      # RIVOLT_OIDC_GOOGLE_DISPLAY_NAME: "Google"
      # RIVOLT_OIDC_GOOGLE_SCOPES: "openid,email,profile"  # default; override only if needed
      #
      # Self-hosted Authentik / Authelia / Keycloak follow the same
      # pattern — add the slug to RIVOLT_OIDC_PROVIDERS and set
      # RIVOLT_OIDC_<UPPER_SLUG>_{ISSUER,CLIENT_ID,CLIENT_SECRET,...}.
      # RIVOLT_OIDC_AUTHENTIK_ISSUER: "https://auth.example.com/application/o/rivolt/"
      # RIVOLT_OIDC_AUTHENTIK_CLIENT_ID: ""
      # RIVOLT_OIDC_AUTHENTIK_CLIENT_SECRET: ""

      # Postgres. Service-name DNS; nothing is exposed to the LAN.
      DB_HOST: "postgres"
      DB_NAME: "rivolt"
      DB_USER: "rivolt"
      DB_PASSWORD: *pg_password

      # Optional AI keys (leave blank to configure in Settings UI).
      # OPENAI_API_KEY: ""
      # ANTHROPIC_API_KEY: ""
      # GEMINI_API_KEY: ""

      # Optional VAPID override; auto-generated + persisted otherwise.
      # VAPID_SUBJECT: "mailto:you@example.com"
      # VAPID_PUBLIC_KEY: ""
      # VAPID_PRIVATE_KEY: ""
    volumes:
      - rivolt-data:/data
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: rivolt-postgres
    restart: always
    environment:
      POSTGRES_USER: rivolt
      POSTGRES_PASSWORD: *pg_password
      POSTGRES_DB: rivolt
    volumes:
      - rivolt-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rivolt"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

volumes:
  rivolt-data:
  rivolt-pg:
