{{- if not .Values.secrets.existingSecret }}
{{- /*
  KEK sourcing — three paths, in priority order:

    1. `secrets.kek` set explicitly  → use that value verbatim.
    2. autoGenerateKek + existing Secret in cluster
                                     → re-emit the existing KEK so
                                        upgrades don't rotate it.
    3. autoGenerateKek + no existing → mint a fresh KEK with
                                        `randBytes 32` (Sprig returns
                                        base64-encoded random bytes,
                                        which is exactly the on-disk
                                        format the app expects after
                                        the `v1:` key-id prefix).

  We deliberately do NOT regenerate when an existing Secret is in
  the cluster — every encrypted row in the DB was written under the
  current KEK, and a regenerate would brick them all. The
  `helm.sh/resource-policy: keep` annotation below prevents
  `helm uninstall` from deleting the Secret in the first place.

  GitOps caveat: `lookup` returns nil under client-side rendering
  (ArgoCD), so leaving `secrets.kek` empty under ArgoCD will mint a
  fresh KEK on every reconcile. Pin the value via inline + sealed-
  secrets, or ExternalSecrets + `secrets.existingSecret`.
*/}}
{{- $secretName := include "rivolt.appSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $kek := .Values.secrets.kek }}
{{- if and (not $kek) .Values.secrets.autoGenerateKek }}
  {{- if and $existing (index ($existing.data | default dict) "RIVOLT_KEK") }}
    {{- $kek = index $existing.data "RIVOLT_KEK" | b64dec }}
  {{- else }}
    {{- $kek = printf "v1:%s" (randBytes 32) }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rivolt.labels" . | nindent 4 }}
  # KEEP across helm uninstall. Losing the KEK after rows have been
  # written is unrecoverable — every encrypted column (Rivian
  # session, AI keys, VAPID private key) is sealed under it. Delete
  # this Secret manually if you really mean it.
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- with $kek }}
  RIVOLT_KEK: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.kekRotation }}
  RIVOLT_KEK_ROTATION: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.username }}
  RIVOLT_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.password }}
  RIVOLT_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.cookieSecret }}
  RIVOLT_COOKIE_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openAIApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidSubject }}
  VAPID_SUBJECT: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPublicKey }}
  VAPID_PUBLIC_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPrivateKey }}
  VAPID_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
  {{- /*
    DB_PASSWORD only lives in the chart-managed Secret when
    cnpg.enabled=false AND no externalDatabase.existingSecret was
    supplied. In every other path the password is sourced via
    secretKeyRef from a Secret we don't manage.
  */}}
  {{- if and (not .Values.cnpg.enabled) (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.password }}
  DB_PASSWORD: {{ .Values.externalDatabase.password | quote }}
  {{- end }}
{{- end }}
