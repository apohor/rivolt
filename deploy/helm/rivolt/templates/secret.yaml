{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rivolt.appSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rivolt.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.kek }}
  RIVOLT_KEK: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.kekRotation }}
  RIVOLT_KEK_ROTATION: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.username }}
  RIVOLT_USERNAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.password }}
  RIVOLT_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.cookieSecret }}
  RIVOLT_COOKIE_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.openAIApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidSubject }}
  VAPID_SUBJECT: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPublicKey }}
  VAPID_PUBLIC_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vapidPrivateKey }}
  VAPID_PRIVATE_KEY: {{ . | quote }}
  {{- end }}
  {{- /*
    DB_PASSWORD only lives in the chart-managed Secret when
    cnpg.enabled=false AND no externalDatabase.existingSecret was
    supplied. In every other path the password is sourced via
    secretKeyRef from a Secret we don't manage.
  */}}
  {{- if and (not .Values.cnpg.enabled) (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.password }}
  DB_PASSWORD: {{ .Values.externalDatabase.password | quote }}
  {{- end }}
{{- end }}
