apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rivolt.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rivolt.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  # Update strategy is configurable so deployments don't have to
  # eat a hard "no available server" window. Default in values.yaml
  # is RollingUpdate (maxSurge=1, maxUnavailable=0) so a new pod
  # comes up healthy before the old one is removed. Operators who
  # turn `persistence.enabled` on with a ReadWriteOnce PVC must
  # flip this to Recreate via values to avoid two pods racing for
  # the volume — see values.yaml for the trade-off note.
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "rivolt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rivolt.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the pod when config or app secrets change so we don't
        # serve stale env until the next manual restart.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "rivolt.serviceAccountName" . }}
      # Give the binary time to (a) stop receiving new traffic via
      # the preStop sleep, then (b) finish in-flight requests +
      # release Rivian websocket subscriptions cleanly. 30s is
      # enough headroom for a slow GraphQL roundtrip; bump if a
      # specific upstream call regularly exceeds that.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: rivolt
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "rivolt.fullname" . }}-config
            - secretRef:
                name: {{ include "rivolt.appSecretName" . }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            # Pod identity for the subscription-lease coordinator
            # (internal/leases). Must be unique per pod across the
            # ReplicaSet — `metadata.name` from the downward API
            # gives us exactly that.
            - name: RIVOLT_POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # DB_USER. CNPG: from the auto-generated <cluster>-app
            # Secret. External w/ existingSecret + UserKey: from
            # there. Otherwise the literal in externalDatabase.user.
            {{- $dbUserSecret := include "rivolt.dbUserSecretName" . }}
            {{- if $dbUserSecret }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $dbUserSecret }}
                  key: {{ include "rivolt.dbUserSecretKey" . }}
            {{- else }}
            - name: DB_USER
              value: {{ include "rivolt.dbUserLiteral" . | quote }}
            {{- end }}
            # DB_PASSWORD. Always via secretKeyRef — either the
            # CNPG-managed Secret, the user-supplied one, or the
            # chart-managed `<release>-app` Secret.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rivolt.dbPasswordSecretName" . }}
                  key: {{ include "rivolt.dbPasswordSecretKey" . }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          # Drain hook: kubelet pulls the pod out of the Service's
          # Endpoints concurrently with sending SIGTERM. There's a
          # brief race where new traffic can still hit a terminating
          # pod. A short preStop sleep gives kube-proxy / Traefik
          # time to remove the endpoint before the binary starts
          # tearing down — eliminates 502s during rollouts.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            # readOnlyRootFilesystem=true means we need a writable
            # /tmp for any transient scratch (Go's os.MkdirTemp,
            # net/http multipart, …). Mounted from emptyDir.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "rivolt.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
