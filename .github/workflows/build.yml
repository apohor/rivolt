# Build, test, and publish the rivolt container image.
#
# Two jobs:
#   1. test    — go vet/test + web typecheck/build. Runs on every push + PR.
#   2. publish — image push to GHCR. Only runs on vX.Y.Z tags or manual
#                workflow_dispatch. Pushes to main only run tests.
#
# Triggers:
#   - Push to main        → test only
#   - Push of vX.Y.Z tag  → test, then publish 'vX.Y.Z', 'X.Y', 'latest'
#                          (linux/amd64 only)
#   - Pull request        → test only
#   - workflow_dispatch   → test + publish; the `platforms` input picks
#                          amd64 (default) or amd64+arm64
#
# Triggers:
#   - Push to main        → test only
#   - Push of vX.Y.Z tag  → test, then publish 'vX.Y.Z', 'X.Y', 'latest'
#   - Pull request        → test only
#   - workflow_dispatch   → test + publish (manual re-releases)
name: build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - "docker-compose*.yml"
      - "LICENSE"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "deploy/**"
      - "docker-compose*.yml"
      - "LICENSE"
      - ".editorconfig"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms (comma-separated) for the published image"
        required: false
        default: "linux/amd64"
        type: choice
        options:
          - linux/amd64
          - linux/amd64,linux/arm64

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Type-check web
        working-directory: web
        run: npx tsc --noEmit

      - name: Build web
        working-directory: web
        run: npm run build

  go:
    name: go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Satisfy `//go:embed all:dist` without running the vite build.
      # Assets() returns nil at runtime when index.html is absent, so
      # the stub is safe for vet/test.
      - name: Stub web assets for embed
        run: |
          mkdir -p internal/web/dist
          touch internal/web/dist/.keep

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  integration:
    name: integration
    runs-on: ubuntu-latest
    # GitHub-hosted ubuntu runners ship Docker, which testcontainers-go
    # talks to over the default unix socket — no extra service: block
    # needed.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Pre-pull so the testcontainers run-time isn't dominated by the
      # postgres image fetch. ~80MB, cached across runs by docker.
      - name: Pull postgres image
        run: docker pull postgres:16-alpine

      - name: go test (integration)
        run: go test -tags=integration -count=1 -timeout=5m ./internal/integration/...

  publish:
    name: publish
    needs: [web, go, integration]
    # Publish only on version tags or explicit manual dispatch. Pushes to
    # main run tests but don't produce an image — nothing consumes the
    # main/main-<sha> tags, and every merge re-publishing :latest-shaped
    # artifacts just burns CI minutes.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
      id-token: write   # reserved for future cosign signing
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}  # e.g. apohor/rivolt
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No QEMU needed: the Dockerfile runs web/go stages on $BUILDPLATFORM
      # and cross-compiles Go to linux/arm64 via GOOS/GOARCH. The runtime
      # stage is COPY-only, so arm64 images are produced without emulation.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          # amd64 is the DSM target and the only platform Rivolt is
          # currently deployed on. Multi-arch builds roughly double
          # the image stage time, so arm64 is opt-in via
          # workflow_dispatch (`platforms` input) for the rare
          # cases we need to publish both.
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64' }}
          push: true
          provenance: false
          # Stamp the semver derived by metadata-action into the Go
          # binary so /api/health and the Overview subtitle report it
          # (e.g. "Rivolt v0.1.0" on DSM instead of "Rivolt dev").
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
